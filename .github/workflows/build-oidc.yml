name: Build & push OIDC image

on:
  push:
    branches: [oidc]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/wg-easy-oidc
  UPSTREAM: wg-easy/wg-easy

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: oidc
          fetch-depth: 0

      - name: Sync with upstream
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/${{ env.UPSTREAM }}.git || true
          git fetch upstream master
          if git rebase upstream/master; then
            git push origin oidc --force-with-lease
          else
            git rebase --abort
            echo "::warning::Rebase failed — manual intervention needed"
          fi

      - name: Lowercase image name
        run: echo "IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:latest
